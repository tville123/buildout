<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style></style></head><body><div class="card">
  <div class="section-label">Borders & strokes</div>
  <div class="row">
    <div class="swatch" style="min-height:92px;background:#1a1a1a;border:1px solid #2e2e2e;justify-content:center;align-items:center">
      <div class="token-name">1px solid #2e2e2e</div>
      <div class="token-meta">default border</div>
    </div>
    <div class="swatch" style="min-height:92px;background:#1a1a1a;border:1px solid #f5c842;justify-content:center;align-items:center">
      <div class="token-name yellow">1px solid #f5c842</div>
      <div class="token-meta">focus / active</div>
    </div>
    <div class="swatch" style="min-height:92px;background:#0f0f0f;border:1px dashed #2e2e2e;justify-content:center;align-items:center">
      <div class="token-name">1px dashed #2e2e2e</div>
      <div class="token-meta">add-slot / empty</div>
    </div>
  </div>
  <div class="token-meta">No shadow. No inner stroke. Borders + background contrast carry all elevation.</div>
</div></body></html>
