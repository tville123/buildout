<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buildout — Mobile UI Kit</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="buildout-tokens.css">
<style>
  html, body { margin: 0; padding: 0; background: #0b0b0b; min-height: 100vh; }
  body { display: flex; flex-direction: column; align-items: center; padding: 40px 0; gap: 24px; }
  .meta {
    color: #888; font-family: 'IBM Plex Sans', system-ui, sans-serif; font-size: 12px;
    letter-spacing: 0.04em; text-align: center; max-width: 360px; line-height: 1.55;
  }
  .meta b { color: #f5c842; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; }
  /* Make the iOS frame's internal flex column collapse correctly around our app */
  .bo-stage { position: relative; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div class="meta">
    <b>Buildout · iOS UI Kit</b><br>
    Click the bottom tabs to switch calculators. Inputs are live — edit any field and watch the yellow result card update.
  </div>
  <div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="PaintScreen.jsx"></script>
<script type="text/babel" src="TileScreen.jsx"></script>
<script type="text/babel" src="DrywallScreen.jsx"></script>
<script type="text/babel">
const TABS = ['Paint', 'Tile', 'Grout', 'LVP', 'Carpet', 'Stairs', 'Drywall'];

function ComingSoon({ name }) {
  return (
    <>
      <TopBar tag={name} showUpgrade={true} />
      <div className="bo-scroll">
        <div className="bo-section">
          <SectionLabel text="Coming soon" />
          <EmptyState icon="🔨">Tap Paint, Tile, or Drywall above to see live screens.</EmptyState>
        </div>
      </div>
    </>
  );
}

function App() {
  const [tab, setTab] = React.useState('Paint');
  const screen = tab === 'Paint' ? <PaintScreen />
    : tab === 'Tile' ? <TileScreen />
    : tab === 'Drywall' ? <DrywallScreen />
    : <ComingSoon name={tab} />;

  return (
    <div className="bo-stage">
      <IOSDevice width={402} height={874} dark={true}>
        <div className="bo-app">
          {screen}
          <TabBar tabs={TABS} active={tab} onSelect={setTab} />
        </div>
      </IOSDevice>
    </div>
  );
}

const mount = document.getElementById('root');
ReactDOM.createRoot(mount).render(<App />);
</script>
</body>
</html>
