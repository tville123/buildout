<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style></style></head><body><div class="card">
  <div class="section-label">Toggle chip · off / on</div>
  <div class="row">
    <div style="flex:1;background:#1a1a1a;border:1px solid #2e2e2e;border-radius:8px;padding:11px;display:flex;align-items:center;gap:9px">
      <div style="width:17px;height:17px;border-radius:4px;border:1.5px solid #2e2e2e"></div>
      <div>
        <div style="font-family:var(--font-body);font-size:12.5px;color:#888">Door</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#555">~21 sq ft</div>
      </div>
    </div>
    <div style="flex:1;background:rgba(245,200,66,0.06);border:1px solid #f5c842;border-radius:8px;padding:11px;display:flex;align-items:center;gap:9px">
      <div style="width:17px;height:17px;border-radius:4px;background:#f5c842;display:flex;align-items:center;justify-content:center">
        <span style="font-family:var(--font-body);font-weight:700;font-size:9px;color:#000">✓</span>
      </div>
      <div>
        <div style="font-family:var(--font-body);font-size:12.5px;color:#f0ede8">Window</div>
        <div style="font-family:var(--font-mono);font-size:10px;color:#555">~12 sq ft each</div>
      </div>
    </div>
  </div>
</div></body></html>
