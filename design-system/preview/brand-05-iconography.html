<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .icon-tile {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px;
  }
  .icon-tile svg {
    width: 26px; height: 26px;
    stroke: currentColor; fill: none;
    stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round;
  }
  .icon-tile.active { color: #f5c842; background: rgba(245,200,66,0.06); }
  .icon-tile.inactive { color: #555; }
</style>
</head><body><div class="card">
  <div class="section-label">Iconography · Ionicons outline</div>
  <div class="row" style="gap:14px;align-items:center">

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile active">
        <!-- Paint: roller / brush, ferrule + handle -->
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="14" height="6" rx="1"/>
          <path d="M17 7h2.5a1.5 1.5 0 0 1 1.5 1.5V11a2 2 0 0 1-2 2h-7v3"/>
          <rect x="9" y="16" width="4" height="5" rx="1"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#f5c842;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Paint</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- Tile: 2x2 grid -->
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="8" height="8" rx="1"/>
          <rect x="13" y="3" width="8" height="8" rx="1"/>
          <rect x="3" y="13" width="8" height="8" rx="1"/>
          <rect x="13" y="13" width="8" height="8" rx="1"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Tile</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- Grout: dots in a 3x3 grid (Ionicons "apps") -->
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="5" height="5" rx="1"/>
          <rect x="9.5" y="3" width="5" height="5" rx="1"/>
          <rect x="16" y="3" width="5" height="5" rx="1"/>
          <rect x="3" y="9.5" width="5" height="5" rx="1"/>
          <rect x="9.5" y="9.5" width="5" height="5" rx="1"/>
          <rect x="16" y="9.5" width="5" height="5" rx="1"/>
          <rect x="3" y="16" width="5" height="5" rx="1"/>
          <rect x="9.5" y="16" width="5" height="5" rx="1"/>
          <rect x="16" y="16" width="5" height="5" rx="1"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Grout</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- LVP: stacked layers / planks (Ionicons "layers-outline") -->
        <svg viewBox="0 0 24 24">
          <path d="M12 3 2 8l10 5 10-5-10-5Z"/>
          <path d="M2 13l10 5 10-5"/>
          <path d="M2 18l10 5 10-5"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">LVP</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- Carpet: horizontal bands (Ionicons "albums-outline") -->
        <svg viewBox="0 0 24 24">
          <rect x="3" y="4" width="18" height="16" rx="1.5"/>
          <path d="M3 9h18M3 14h18"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Carpet</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- Stairs: stepped path -->
        <svg viewBox="0 0 24 24">
          <path d="M3 20h4v-4h4v-4h4v-4h6"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Stairs</div>
    </div>

    <div class="col" style="flex:1;align-items:center;gap:5px">
      <div class="icon-tile inactive">
        <!-- Drywall: hammer outline, single tool -->
        <svg viewBox="0 0 24 24">
          <path d="m13 3 8 4-2.5 4.5L10.5 7.5 13 3Z"/>
          <path d="M11 8 4 17l3 3 7-9"/>
        </svg>
      </div>
      <div class="token-meta" style="color:#555;font-size:9px;letter-spacing:0.1em;text-transform:uppercase">Drywall</div>
    </div>

  </div>
  <div class="token-meta">Outline-only · 1.6px stroke · round caps. Production: Ionicons via @expo/vector-icons at 24px. Web: matching SVGs (or Lucide). Color: --text-dim inactive, --yellow active.</div>
</div></body></html>
