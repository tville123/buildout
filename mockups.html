<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buildout — Color Scheme Mockups</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #111; font-family: 'IBM Plex Sans', sans-serif; padding: 40px 24px 80px; }
h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #fff; text-align: center; margin-bottom: 8px; }
.subtitle { text-align: center; font-size: 13px; color: #666; margin-bottom: 48px; }
.row-label { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: #333; text-align: center; text-transform: uppercase; margin-bottom: 24px; margin-top: 8px; }
.schemes { display: flex; gap: 32px; justify-content: center; flex-wrap: wrap; align-items: flex-start; margin-bottom: 56px; }
.scheme-col { display: flex; flex-direction: column; align-items: center; gap: 14px; }
.scheme-badge { font-family: 'IBM Plex Sans', sans-serif; font-size: 10px; font-weight: 500; letter-spacing: 2.5px; text-transform: uppercase; color: #555; }
.scheme-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: #fff; }
.phone { width: 310px; background: #000; border-radius: 44px; padding: 11px; box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.08); }
.phone-inner { border-radius: 34px; overflow: hidden; height: 630px; position: relative; display: flex; flex-direction: column; }
.notch-bar { height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.notch { width: 100px; height: 26px; border-radius: 0 0 16px 16px; position: absolute; top: 0; }
.screen-scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
.screen-scroll::-webkit-scrollbar { display: none; }
.palette { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 310px; }
.swatch { width: 26px; height: 26px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.08); }
</style>
</head>
<body>

<h1>Buildout — Color Scheme Mockups</h1>
<p class="subtitle">Paint Calculator · All five color schemes</p>

<div id="root"></div>

<script>
const THEMES = [
  {
    badge: 'Current',   name: 'Original',
    bg: '#0f0f0f', surf: '#1a1a1a', bord: '#2e2e2e',
    acc: '#f5c842', text: '#f0ede8', dim: '#555', mid: '#888',
    // result card
    rcBg: '#f5c842', rcText: '#000', rcSub: 'rgba(0,0,0,0.45)', rcDivider: 'rgba(0,0,0,0.12)',
  },
  {
    badge: 'Option 1',  name: 'Blueprint',
    bg: '#0a0d14', surf: '#131824', bord: '#1e2a3a',
    acc: '#4d9fff', text: '#e8edf5', dim: '#3a4a5c', mid: '#6a7d94',
    rcBg: '#4d9fff', rcText: '#000', rcSub: 'rgba(0,0,0,0.45)', rcDivider: 'rgba(0,0,0,0.12)',
  },
  {
    badge: 'Option 2',  name: 'Ember',
    bg: '#100d0a', surf: '#1c1714', bord: '#2e2520',
    acc: '#c97b3a', text: '#f0ebe4', dim: '#4a3d34', mid: '#7a6a5e',
    rcBg: '#c97b3a', rcText: '#000', rcSub: 'rgba(0,0,0,0.45)', rcDivider: 'rgba(0,0,0,0.12)',
  },
  {
    badge: 'Option 3',  name: 'Dark',
    bg: '#121212', surf: '#1e1e1e', bord: '#2c2c2c',
    acc: '#e8e8e8', text: '#e8e8e8', dim: '#3d3d3d', mid: '#6b6b6b',
    rcBg: '#e8e8e8', rcText: '#000', rcSub: 'rgba(0,0,0,0.4)', rcDivider: 'rgba(0,0,0,0.12)',
  },
  {
    badge: 'Option 4',  name: 'Light',
    bg: '#f0ece6', surf: '#ffffff', bord: '#e0dbd5',
    acc: '#1a1714', text: '#1a1714', dim: '#c5bfb8', mid: '#8f8880',
    rcBg: '#1a1714', rcText: '#fff', rcSub: 'rgba(255,255,255,0.4)', rcDivider: 'rgba(255,255,255,0.12)',
  },
];

function hex(color, alpha) {
  return alpha !== undefined
    ? color + Math.round(alpha * 255).toString(16).padStart(2, '0')
    : color;
}

function buildPhone(t) {
  const accFill  = t.acc + '11'; // ~7% fill for active chips
  const tipFill  = t.acc + '0d';
  const tipBord  = t.acc + '1f';
  const segActive = `background:${t.acc};color:${t.rcText};font-weight:500;`;

  return `
<div class="phone">
  <div class="phone-inner" style="background:${t.bg};">

    <!-- notch -->
    <div class="notch-bar" style="background:${t.bg};">
      <div class="notch" style="background:${t.surf};"></div>
    </div>

    <div class="screen-scroll" style="background:${t.bg};">

      <!-- header -->
      <div style="padding:0 20px 16px;border-bottom:1px solid ${t.bord};">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.8px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:4px;">Buildout</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:46px;letter-spacing:2px;line-height:1;color:${t.text};">Paint</div>
        <div style="margin-top:7px;font-family:'IBM Plex Sans',sans-serif;font-size:11px;line-height:1.6;font-weight:300;color:${t.dim};">Calculate how much paint you need for walls, ceilings, and rooms.</div>
      </div>

      <!-- mode -->
      <div style="padding:14px 20px 0;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:8px;">Mode</div>
        <div style="display:flex;background:${t.surf};border:1px solid ${t.bord};border-radius:10px;padding:3px;gap:3px;">
          <div style="flex:1;padding:8px 6px;border-radius:7px;text-align:center;font-family:'IBM Plex Sans',sans-serif;font-size:11.5px;${segActive}">Full Room</div>
          <div style="flex:1;padding:8px 6px;border-radius:7px;text-align:center;font-family:'IBM Plex Sans',sans-serif;font-size:11.5px;color:${t.mid};">Manual Walls</div>
        </div>
      </div>

      <!-- dimensions -->
      <div style="padding:14px 20px 0;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:8px;">Room Dimensions</div>
        <div style="display:flex;gap:6px;">
          <div style="flex:1;background:${t.surf};border:1px solid ${t.acc};border-radius:10px;padding:10px 11px;">
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;color:${t.dim};margin-bottom:3px;">Length</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:${t.text};">12</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${t.dim};margin-top:1px;">ft</div>
          </div>
          <div style="flex:1;background:${t.surf};border:1px solid ${t.bord};border-radius:10px;padding:10px 11px;">
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;color:${t.dim};margin-bottom:3px;">Width</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:${t.text};">10</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${t.dim};margin-top:1px;">ft</div>
          </div>
          <div style="flex:1;background:${t.surf};border:1px solid ${t.bord};border-radius:10px;padding:10px 11px;">
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.6px;text-transform:uppercase;color:${t.dim};margin-bottom:3px;">Height</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;color:${t.text};">9</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:${t.dim};margin-top:1px;">ft</div>
          </div>
        </div>
      </div>

      <!-- openings -->
      <div style="padding:14px 20px 0;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:8px;">Openings</div>
        <div style="display:flex;gap:8px;">
          <div style="flex:1;background:${t.surf};border:1px solid ${t.acc};border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;background:${accFill};">
            <div style="width:15px;height:15px;border-radius:3px;border:1.5px solid ${t.acc};background:${t.acc};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <span style="font-size:8px;color:${t.rcText};font-weight:700;">✓</span>
            </div>
            <span style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:${t.text};">1 Door</span>
          </div>
          <div style="flex:1;background:${t.surf};border:1px solid ${t.bord};border-radius:8px;padding:9px 10px;display:flex;align-items:center;gap:8px;">
            <div style="width:15px;height:15px;border-radius:3px;border:1.5px solid ${t.bord};flex-shrink:0;"></div>
            <span style="font-family:'IBM Plex Sans',sans-serif;font-size:11px;color:${t.mid};">Windows</span>
          </div>
        </div>
      </div>

      <!-- surface -->
      <div style="padding:14px 20px 0;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:8px;">Surface</div>
        <div style="display:flex;background:${t.surf};border:1px solid ${t.bord};border-radius:10px;padding:3px;gap:3px;">
          <div style="flex:1;padding:8px 4px;border-radius:7px;text-align:center;font-family:'IBM Plex Sans',sans-serif;font-size:10.5px;color:${t.mid};">Smooth</div>
          <div style="flex:1;padding:8px 4px;border-radius:7px;text-align:center;font-family:'IBM Plex Sans',sans-serif;font-size:10.5px;${segActive}">Semi-Rough</div>
          <div style="flex:1;padding:8px 4px;border-radius:7px;text-align:center;font-family:'IBM Plex Sans',sans-serif;font-size:10.5px;color:${t.mid};">Textured</div>
        </div>
      </div>

      <!-- result card -->
      <div style="margin:14px 20px 0;background:${t.rcBg};border-radius:14px;padding:16px;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:${t.rcSub};font-weight:500;margin-bottom:2px;">Total Paint Needed</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:56px;color:${t.rcText};letter-spacing:1px;line-height:1;">3.7 <span style="font-family:'IBM Plex Sans',sans-serif;font-size:15px;font-weight:300;">gallons</span></div>
        <div style="height:1px;background:${t.rcDivider};margin:11px 0;"></div>
        <div style="display:flex;gap:20px;">
          <div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:${t.rcText};">396</div>
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.3px;text-transform:uppercase;color:${t.rcSub};margin-top:1px;">sq ft</div>
          </div>
          <div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:${t.rcText};">2</div>
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.3px;text-transform:uppercase;color:${t.rcSub};margin-top:1px;">coats</div>
          </div>
          <div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:500;color:${t.rcText};">350</div>
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8.5px;letter-spacing:1.3px;text-transform:uppercase;color:${t.rcSub};margin-top:1px;">sq ft/gal</div>
          </div>
        </div>
      </div>

      <!-- shopping list -->
      <div style="margin:10px 20px 0;background:${t.surf};border:1px solid ${t.bord};border-radius:14px;padding:13px;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:9px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;color:${t.acc};margin-bottom:9px;">Shopping List — Walls</div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid ${t.bord};">
          <div>
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;color:${t.text};">Paint (1 gal)</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:${t.dim};margin-top:1px;">walls · semi-rough</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${t.acc};">3</div>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;">
          <div>
            <div style="font-family:'IBM Plex Sans',sans-serif;font-size:12.5px;color:${t.text};">Paint (1 qt)</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:9.5px;color:${t.dim};margin-top:1px;">walls · semi-rough</div>
          </div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${t.acc};">3</div>
        </div>
      </div>

      <!-- tip bar -->
      <div style="margin:8px 20px 20px;background:${tipFill};border:1px solid ${tipBord};border-radius:10px;padding:10px;">
        <div style="font-family:'IBM Plex Sans',sans-serif;font-size:10.5px;line-height:1.6;color:${t.mid};">
          <span style="font-weight:500;color:${t.acc};">Pro tip:</span> A quart is perfect for small walls or accent coverage.
        </div>
      </div>

      <!-- tab bar spacer -->
      <div style="height:70px;flex-shrink:0;"></div>
    </div>

    <!-- tab bar -->
    <div style="position:absolute;bottom:0;left:0;right:0;height:70px;background:${t.surf};border-top:1px solid ${t.bord};display:flex;align-items:center;justify-content:space-around;padding:0 4px 10px;">
      ${['🎨 Paint','⬜ Tile','🧱 Grout','📐 LVP','🏠 More'].map((tab, i) => {
        const [icon, label] = tab.split(' ');
        const active = i === 0;
        const color = active ? t.acc : t.mid;
        return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;">
          <div style="font-size:17px;">${icon}</div>
          <div style="font-family:'IBM Plex Sans',sans-serif;font-size:8px;font-weight:500;letter-spacing:0.5px;color:${color};">${label}</div>
        </div>`;
      }).join('')}
    </div>

  </div>
</div>`;
}

function buildPalette(t) {
  const swatches = [t.bg, t.surf, t.bord, t.acc, t.text];
  return `<div class="palette">${swatches.map(c =>
    `<div class="swatch" style="background:${c};" title="${c}"></div>`
  ).join('')}</div>`;
}

function buildCol(t) {
  return `
<div class="scheme-col">
  <div class="scheme-badge">${t.badge}</div>
  <div class="scheme-name">${t.name}</div>
  ${buildPhone(t)}
  ${buildPalette(t)}
</div>`;
}

const root = document.getElementById('root');

// Row 1: branded schemes
const row1 = document.createElement('div');
row1.innerHTML = `<div class="row-label">Branded Schemes</div>
<div class="schemes">${THEMES.slice(0,3).map(buildCol).join('')}</div>`;
root.appendChild(row1);

// Row 2: system themes
const row2 = document.createElement('div');
row2.innerHTML = `<div class="row-label">System Themes</div>
<div class="schemes">${THEMES.slice(3).map(buildCol).join('')}</div>`;
root.appendChild(row2);
</script>
</body>
</html>
